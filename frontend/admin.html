<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" style="background-color: var(--bg-dark); border-bottom: 1px solid var(--glass-border);">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-arrow-left" style="font-size: 1rem; margin-right: 0.5rem;"></i>
                Nasir's <span>Portfolio</span>
            </a>
        </div>
    </nav>

    <main>
        <!-- Login View -->
        <div id="login-view" class="section container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div class="contact-form-card" style="max-width: 400px; width: 100%;" class="fade-in-up">
                <div class="section-header" style="margin-bottom: 2rem;">
                    <h2 class="heading-sm">Admin Access</h2>
                    <div class="section-divider" style="margin: 0.5rem auto 0;"></div>
                </div>
                <form id="admin-login-form">
                    <div class="form-group">
                        <input type="password" id="admin-password" placeholder="Enter password" class="form-input" required />
                    </div>
                    <div id="login-error" class="form-status text-error" style="margin-bottom: 1rem;"></div>
                    <button type="submit" class="btn btn-primary btn-submit">Login</button>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="section container hidden" style="padding-top: 10rem; min-height: 100vh;">
            <div class="section-header">
                <h2 class="heading-md">Dashboard</h2>
                <div class="section-divider"></div>
            </div>

            <div id="dashboard-loading" style="text-align: center; color: var(--accent-primary);">Loading data...</div>
            <div id="dashboard-error" class="text-error" style="text-align: center; margin-bottom: 2rem;"></div>

            <div id="dashboard-content" class="hidden">
                <div class="grid-cols-2" style="margin-bottom: 4rem;">
                    <div class="skill-card fade-in-up" style="text-align: center;">
                        <h3 class="skill-title">Total Views</h3>
                        <p id="stat-views" class="heading-lg text-gradient">0</p>
                    </div>
                    <div class="skill-card fade-in-up" style="text-align: center; transition-delay: 0.1s;">
                        <h3 class="skill-title">Total Messages</h3>
                        <p id="stat-messages" class="heading-lg text-gradient">0</p>
                    </div>
                </div>

                <h3 class="heading-sm" style="margin-bottom: 2rem; color: var(--accent-primary);">Inbox</h3>
                
                <div id="messages-grid" class="messages-grid">
                    <!-- Messages populated securely via JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
